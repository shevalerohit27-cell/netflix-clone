<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Years | EduVault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; text-align: center; }
        .header { background: #003366; color: white; padding: 30px; border-bottom: 5px solid #ffcc00; }
        .container { padding: 50px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        
        .year-card { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s;
            border-bottom: 5px solid #003366; text-decoration: none; color: inherit;
        }
        .year-card:hover { transform: translateY(-10px); background: #eef5ff; border-color: #ffcc00; }
        .year-card i { font-size: 3rem; color: #003366; margin-bottom: 15px; }
        .year-card h3 { font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Science Department</h1>
        <p>Apna saal (Year) select karein</p>
    </div>

    <div class="container">
     <div class="year-card" onclick="window.location.href='bscfy.html'">
    <i class="fas fa-graduation-cap"></i>
    <h3>1st Year (FY)</h3>
</div>
        <a href="sci-sy.html" class="year-card">
            <i class="fas fa-user-graduate"></i>
            <h3>2nd Year (SY)</h3>
        </a>

        <a href="sci-ty.html" class="year-card">
            <i class="fas fa-award"></i>
            <h3>3rd Year (TY)</h3>
        </a>
    </div>

</body>
</html>
