<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flower Shop</title>
    <link rel="stylesheet" href="flexbox.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<!-- Navbar -->
<header>
    <h2 class="logo">Flower<span>Shop</span></h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- Hero Section -->
<section class="hero">
    <div class="hero-text">
        <h1>Fresh Flowers</h1>
        <p>Beautiful & fresh flowers delivered to your doorstep.</p>
        <button>Shop Now</button>
    </div>
</section>

<!-- Products -->
<section class="products">
    <h2>Our Flowers</h2>

    <div class="product-box">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" alt="">
            <h3>Rose Bouquet</h3>
            <p>₹499</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde" alt="">
            <h3>Lily Flowers</h3>
            <p>₹599</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946" alt="">
            <h3>Sunflower</h3>
            <p>₹399</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 FlowerShop | All Rights Reserved</p>
</footer>

</body>
</html>
